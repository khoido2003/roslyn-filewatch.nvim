name: Build Rust Native Module
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: roslyn_filewatch_rs-linux-x86_64.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: roslyn_filewatch_rs-linux-arm64.so
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: roslyn_filewatch_rs-macos-arm64.so
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: roslyn_filewatch_rs-macos-x86_64.so
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: roslyn_filewatch_rs-windows-x86_64.dll
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset_name: roslyn_filewatch_rs-windows-arm64.dll
    steps:
      - uses: actions/checkout@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Cross-Compilation Tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build Library
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: rust
      - name: Set Binary Extension
        id: bin_ext
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            echo "ext=dll" >> $GITHUB_OUTPUT
            echo "prefix=" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.target }}" == *"apple"* ]]; then
            echo "ext=dylib" >> $GITHUB_OUTPUT
            echo "prefix=lib" >> $GITHUB_OUTPUT
          else
            echo "ext=so" >> $GITHUB_OUTPUT
            echo "prefix=lib" >> $GITHUB_OUTPUT
          fi
      - name: Prepare Artifact
        shell: bash
        run: |
          BIN_NAME="${{ steps.bin_ext.outputs.prefix }}roslyn_filewatch_rs.${{ steps.bin_ext.outputs.ext }}"
          cp "rust/target/${{ matrix.target }}/release/$BIN_NAME" "rust/target/release/${{ matrix.asset_name }}"
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          files: rust/target/release/${{ matrix.asset_name }}