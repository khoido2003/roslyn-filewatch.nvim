name: Build Rust Native Module

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: libroslyn_filewatch_rs.so
            asset_name: roslyn_filewatch_rs-linux-x86_64.so
          - os: macos-latest
            artifact_name: libroslyn_filewatch_rs.dylib
            asset_name: roslyn_filewatch_rs-macos-arm64.so
          - os: macos-13
            artifact_name: libroslyn_filewatch_rs.dylib
            asset_name: roslyn_filewatch_rs-macos-x86_64.so
          - os: windows-latest
            artifact_name: roslyn_filewatch_rs.dll
            asset_name: roslyn_filewatch_rs-windows-x86_64.dll

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Library
        run: cargo build --release
        working-directory: rust

      - name: Rename Artifact (Unix)
        if: runner.os != 'Windows'
        run: mv rust/target/release/${{ matrix.artifact_name }} rust/target/release/${{ matrix.asset_name }}

      - name: Rename Artifact (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item -Path "rust\target\release\${{ matrix.artifact_name }}" -NewName "${{ matrix.asset_name }}"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: rust/target/release/${{ matrix.asset_name }}
